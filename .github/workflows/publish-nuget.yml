name: publish-nuget

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Package version to publish (for example 1.0.0)
        required: true
        type: string

jobs:
  publish:
    runs-on: windows-latest
    permissions:
      contents: read
      packages: write
    env:
      DOTNET_NOLOGO: true
      NUGET_SOURCE_URL: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Resolve package version
        id: version
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $version = '${{ inputs.version }}'
          }
          else {
            $version = '${{ github.ref_name }}'.TrimStart('v')
          }

          if ([string]::IsNullOrWhiteSpace($version)) {
            throw 'Package version could not be resolved.'
          }

          "package_version=$version" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore VGrid.sln

      - name: Build
        run: dotnet build VGrid.sln -c Release --no-restore

      - name: Test
        run: dotnet test tests/VGrid.Tests/VGrid.Tests.csproj -c Release --no-build

      - name: Pack
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts\packages | Out-Null
          dotnet pack src\VGrid.Editor\VGrid.Editor.csproj -c Release --no-build -p:Version=${{ steps.version.outputs.package_version }} -o artifacts\packages

      - name: Authenticate to GitHub Packages
        run: dotnet nuget add source --username ${{ github.actor }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github ${{ env.NUGET_SOURCE_URL }}

      - name: Publish packages
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Get-ChildItem artifacts\packages\*.nupkg |
            Where-Object { $_.Name -notlike '*.snupkg' } |
            ForEach-Object {
              dotnet nuget push $_.FullName --source github --api-key $env:GITHUB_TOKEN --skip-duplicate
            }
