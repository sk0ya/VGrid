name: publish-nuget

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to publish (e.g. 1.0.1)"
        required: true
        type: string

jobs:
  publish:
    runs-on: windows-latest
    permissions:
      contents: read

    env:
      DOTNET_NOLOGO: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Resolve package version
        id: version
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $version = '${{ inputs.version }}'
          } else {
            $version = '${{ github.ref_name }}'.TrimStart('v')
          }

          if ([string]::IsNullOrWhiteSpace($version)) {
            throw 'Package version could not be resolved.'
          }

          "package_version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Publishing version: $version"

      - name: Restore
        run: dotnet restore VGrid.sln

      - name: Build
        run: dotnet build VGrid.sln -c Release --no-restore

      - name: Test
        run: dotnet test tests/VGrid.Tests/VGrid.Tests.csproj -c Release --no-build

      - name: Pack
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts\packages | Out-Null
          dotnet pack src\VGrid.Editor\VGrid.Editor.csproj `
            -c Release `
            --no-build `
            -p:Version=${{ steps.version.outputs.package_version }} `
            -o artifacts\packages

      - name: Publish to nuget.org
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          Get-ChildItem artifacts\packages\*.nupkg |
            Where-Object { $_.Name -notlike '*.snupkg' } |
            ForEach-Object {
              Write-Host "Pushing $($_.Name)"
              dotnet nuget push $_.FullName `
                --source https://api.nuget.org/v3/index.json `
                --api-key $env:NUGET_API_KEY `
                --skip-duplicate
            }
